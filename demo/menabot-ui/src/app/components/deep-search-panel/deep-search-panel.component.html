<div class="deep-search-panel" [class.collapsed]="isCollapsed" [class.completed]="allDone">
  <button class="deep-search-toggle" (click)="toggle()">
    <span class="deep-search-icon">
      <span class="mat-icon">{{ allDone ? 'check_circle' : 'travel_explore' }}</span>
    </span>
    <span class="deep-search-label">{{ allDone ? 'Deep Search Completed' : 'Deep Search&hellip;' }}</span>
    <span class="deep-search-count">{{ steps().length }} {{ steps().length === 1 ? 'step' : 'steps' }}</span>
    <span class="deep-search-caret"><span class="mat-icon">chevron_right</span></span>
  </button>

  @if (!isCollapsed) {
    <div class="deep-search-steps">
      @for (step of steps(); track $index) {
        <div class="ds-step" [class.latest]="$last && isSearching()">
          <span class="ds-step-icon">
            @if ($last && isSearching()) {
              <span class="spinner"></span>
            } @else {
              <span class="checkmark"><span class="mat-icon">check</span></span>
            }
          </span>
          <span class="ds-step-msg" [innerHTML]="step"></span>
        </div>
      }
    </div>
  }
</div>
