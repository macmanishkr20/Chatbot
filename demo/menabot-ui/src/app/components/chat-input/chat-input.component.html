<div class="chat-input-bar">
  @if (selectedChip(); as chip) {
    <div
      class="selected-fn-pill"
      [style.--chip-color]="'var(' + chip.colorVar + ')'"
      [attr.aria-label]="'Selected function: ' + chip.full"
    >
      <span class="dot" aria-hidden="true"></span>
      <span class="code">{{ chip.code }}</span>
      <span class="full">{{ chip.full }}</span>
      <button
        type="button"
        class="clear-btn"
        title="Clear function"
        aria-label="Clear function"
        (click)="clearFunction()"
      >×</button>
    </div>
  }

  <div class="input-wrapper">
    <textarea
      #textareaEl
      class="chat-textarea"
      [attr.placeholder]="placeholder()"
      [ngModel]="inputText()"
      (ngModelChange)="inputText.set($event)"
      (keydown)="onKeydown($event)"
      (input)="autoGrow($event)"
      [disabled]="chat.isStreaming()"
      rows="1"
    ></textarea>

    @if (chat.isStreaming()) {
      <button class="send-btn cancel-btn" title="Stop generating" (click)="cancelStream()">
        <span class="stop-icon"><span class="mat-icon filled">stop_circle</span></span>
      </button>
    } @else {
      <button
        class="send-btn"
        [disabled]="!inputText().trim()"
        title="Send message"
        (click)="send()"
      >
        <span class="send-icon"><span class="mat-icon filled">arrow_upward</span></span>
      </button>
    }
  </div>

  <div class="input-hint">
    Press <kbd>Enter</kbd> to send, <kbd>Shift+Enter</kbd> for new line
  </div>
</div>
