<div class="grid-panel rounded p-3">
  <div class="grid-header d-flex align-items-center justify-content-between mb-3">
    <h6 class="text-white mb-0"></h6>
    <div class="d-flex align-items-center gap-2">
      <input
        type="text"
        placeholder="Search by Email / Role"
        class="form-control form-control-sm "
        [(ngModel)]="searchTerm"
      />
      <button class="btn btn-outline-primary btn-sm text-nowrap" (click)="onAddClicked()">
        <i class="bi bi-plus-lg me-1"></i>
        Add User</button>
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-dark table-sm mb-0 align-middle">
      <thead>
        <tr>
          <th scope="col">Email Id</th>
          <th scope="col">First Name</th>
          <th scope="col">Last Name</th>
          <th scope="col">Role</th>
          <th scope="col"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let dt of _data | slice : (page - 1) * pageSize : (page - 1) * pageSize + pageSize">
          <td>{{ dt.email }}</td>
          <td>{{ dt.firstName }}</td>
          <td>{{ dt.lastName }}</td>
          <td>{{ dt.role }}</td>
          <td class="text-end text-nowrap">
            <a class="btn btn-sm py-0 px-2 action-btn" (click)="editClicked(dt)" title="Edit">
              <i class="bi bi-pen"></i>
            </a>
            <a class="btn btn-sm py-0 px-2 action-btn" (click)="deleteUser(dt)" title="Delete">
              <i class="bi bi-trash"></i>
            </a>
          </td>
        </tr>
        <tr *ngIf="_data.length === 0">
          <td colspan="5" class="text-center text-muted py-4">No users found</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="d-flex flex-row-reverse mt-2">
    <ngb-pagination
      [collectionSize]="_data.length"
      [(page)]="page"
      [pageSize]="pageSize"
    >
    </ngb-pagination>
  </div>
</div>
