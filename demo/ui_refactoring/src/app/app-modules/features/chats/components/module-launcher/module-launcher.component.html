@if (agents().length > 0) {
  <div class="module-launcher">
    <div class="ml-header">
      <i class="bi bi-stars"></i>
      <span class="label-text">Quick start</span>
    </div>
    <ul class="ml-list list-unstyled mb-2">
      @for (agent of agents(); track agent.name) {
        <li class="ml-item" (click)="onPick(agent)" [attr.title]="agent.description">
          <span class="ml-icon"><i class="bi" [ngClass]="'bi-' + (agent.icon || 'app')"></i></span>
          <span class="ml-name text-truncate label-text">{{ agent.display_name }}</span>
        </li>
      }
    </ul>
  </div>
}
