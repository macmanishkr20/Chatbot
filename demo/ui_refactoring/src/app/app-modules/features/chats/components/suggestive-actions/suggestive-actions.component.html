<div class="suggestive-actions">
  @for (action of actions(); track trackByTitle($index, action)) {
    <button type="button"
            class="suggestive-action-btn"
            [attr.title]="action.description || action.short_title"
            (click)="onAction(action)">
      <span class="sa-title">{{ action.short_title }}</span>
    </button>
  }
</div>
