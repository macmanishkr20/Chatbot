<div class="chat-window-wrapper">
    <!-- Conversation topic header -->
    @if (chatStore.conversationTitle()) {
        <div class="conversation-header">
            <span class="conversation-title">{{ chatStore.conversationTitle() }}</span>
        </div>
    }

    <div class="chat-messages" #messagesContainer (scroll)="onMessageScroll($event)">
    @if(loadingOlderMessages){
        <div class="text-center mb-3">
            <span class="spinner-border spinner-border-sm" role="status"></span>
            <span class="ms-2">Loading older messages...</span>
        </div>
    }

    @for(message of chatStore.messages(); track (message.trackId ?? message.messageId || $index); let i = $index){
        <app-chat-message
            [message]="message"
            [attr.data-role]="message.role"
            [actionsFor]="['Assistant']"
            [isLastAssistant]="i === lastAssistantIdx()"
            [feedbackConfig]="feedbackFormConfig()"
            (like)="onLike($event)"
            (feedbackSubmit)="onFeedbackSubmit($event)"
            (regenerate)="onRegen($event)"
            (toggleEdit)="onToggleEdit($event)"
            (cancelEdit)="onCancelEdit($event)"
            (submitEdit)="onEdit($event)"
            (suggestiveAction)="onSuggestiveAction($event)"
            (more)="onMore($event)"
            [user]="chatStore.authUser()">
        </app-chat-message>
    }

    @if(chatStore.error()) {
        <div class="alert alert-danger d-flex justify-content-between align-items-center my-2 py-2" role="alert">
            <span><i class="bi bi-exclamation-triangle me-2"></i>{{ chatStore.error() }}</span>
            <button type="button" class="btn-close btn-close-white" aria-label="Dismiss"
                    (click)="chatStore.error.set(null)"></button>
        </div>
    }
</div>
</div>
