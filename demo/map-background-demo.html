<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MenaBot — Map Background Demo</title>
  <style>
    /* ─────────────────────────────────────────────────────────────
       Tokens — dark + light, matching the live app's EY palette
       ───────────────────────────────────────────────────────────── */
    :root[data-theme="dark"] {
      --bg-canvas:        #07070b;
      --sidebar-bg:       #0a0a0f;
      --sidebar-border:   rgba(255, 255, 255, 0.05);
      --text:             #f5f5f7;
      --text-soft:        #c8c8d0;
      --text-muted:       #8a8a96;
      --card-bg:          rgba(255, 255, 255, 0.03);
      --card-border:      rgba(255, 255, 255, 0.06);
      --input-bg:         rgba(255, 255, 255, 0.04);
      --input-border:     rgba(255, 255, 255, 0.08);
      --chip-bg:          rgba(255, 255, 255, 0.025);
      --chip-border:      rgba(255, 255, 255, 0.08);
      --header-border:    rgba(255, 255, 255, 0.06);

      /* Map */
      --map-line:         rgba(255, 230, 0, 0.62);
      --map-line-soft:    rgba(255, 230, 0, 0.22);
      --map-fill:         rgba(255, 230, 0, 0.035);
      --map-glow:         rgba(255, 230, 0, 0.5);
      --node:             #ffe600;
      --node-soft:        rgba(255, 230, 0, 0.55);
      --link:             rgba(255, 230, 0, 0.55);
      --link-soft:        rgba(255, 230, 0, 0.18);
      --label:            rgba(255, 230, 0, 0.85);
      --label-bg:         rgba(7, 7, 11, 0.55);
      --halo:             rgba(255, 230, 0, 0.16);
      --grid-dot:         rgba(255, 230, 0, 0.05);
      --vignette-edge:    rgba(7, 7, 11, 0.55);
    }

    :root[data-theme="light"] {
      --bg-canvas:        #fbfaf6;
      --sidebar-bg:       #0a0a0f;
      --sidebar-border:   rgba(255, 255, 255, 0.05);
      --text:             #1a1a24;
      --text-soft:        #4a4a55;
      --text-muted:       #7a7a85;
      --card-bg:          rgba(255, 255, 255, 0.78);
      --card-border:      rgba(15, 15, 22, 0.08);
      --input-bg:         rgba(255, 255, 255, 0.78);
      --input-border:     rgba(15, 15, 22, 0.08);
      --chip-bg:          rgba(255, 255, 255, 0.6);
      --chip-border:      rgba(15, 15, 22, 0.08);
      --header-border:    rgba(15, 15, 22, 0.08);

      /* Map (light) — black ink lines, glowing amber lights */
      --map-line:         rgba(15, 15, 22, 0.78);
      --map-line-soft:    rgba(15, 15, 22, 0.28);
      --map-fill:         rgba(15, 15, 22, 0.025);
      --map-glow:         rgba(255, 200, 50, 0.6);
      --node:             #1a1a24;
      --node-soft:        rgba(255, 200, 50, 0.85);
      --link:             rgba(15, 15, 22, 0.5);
      --link-soft:        rgba(15, 15, 22, 0.18);
      --label:            #1a1a24;
      --label-bg:         rgba(255, 250, 235, 0.9);
      --halo:             rgba(255, 200, 50, 0.10);
      --grid-dot:         rgba(15, 15, 22, 0.04);
      --vignette-edge:    rgba(255, 235, 195, 0.05);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Söhne', -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg-canvas);
      color: var(--text);
      overflow: hidden;
      transition: background 0.6s ease, color 0.4s ease;
    }

    /* ─────────────────────────────────────────────────────────────
       Layout — sidebar + main
       ───────────────────────────────────────────────────────────── */
    .app { display: flex; height: 100vh; }

    .sidebar {
      width: 260px; flex-shrink: 0;
      background: var(--sidebar-bg);
      color: #f5f5f7;
      border-right: 1px solid var(--sidebar-border);
      display: flex; flex-direction: column; padding: 14px;
    }

    .sidebar-top { display: flex; align-items: center; gap: 10px; padding: 4px 4px 14px; }
    .sidebar-logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #1a1a24 0%, #0a0a0f 100%);
      color: #ffe600; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; letter-spacing: 0.06em;
      border: 1px solid rgba(255, 230, 0, 0.28);
    }
    .sidebar-title { font-size: 14px; font-weight: 600; }

    .new-chat-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 14px; border-radius: 12px;
      background: linear-gradient(135deg, #ffe600 0%, #ffd400 100%);
      color: #0a0a0f; font-size: 13px; font-weight: 600;
      border: 1px solid rgba(0, 0, 0, 0.15); cursor: pointer;
      box-shadow: 0 4px 12px -6px rgba(255, 230, 0, 0.4);
    }

    .sidebar-section {
      margin-top: 18px; font-size: 11px; letter-spacing: 0.08em;
      text-transform: uppercase; color: rgba(255, 255, 255, 0.5); padding: 0 6px;
    }
    .sidebar-empty { margin-top: 16px; text-align: center; font-size: 12px; color: rgba(255, 255, 255, 0.4); }

    .main {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
      position: relative;
      background: var(--bg-canvas);
      transition: background 0.6s ease;
    }

    .main-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 22px; border-bottom: 1px solid var(--header-border);
      position: relative; z-index: 4;
    }
    .main-header-left { display: flex; align-items: center; gap: 12px; }
    .icon-btn {
      width: 34px; height: 34px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--card-border); background: var(--card-bg);
      color: var(--text-soft); cursor: pointer; font-size: 16px;
    }
    .convo-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .avatar-yellow {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, #ffe600, #ffd400);
      color: #0a0a0f; display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
    }

    /* ─────────────────────────────────────────────────────────────
       Map backdrop
       ───────────────────────────────────────────────────────────── */
    .map-backdrop {
      position: absolute;
      inset: 60px 0 0 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
    .map-backdrop::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(900px 520px at 28% 38%, var(--halo), transparent 70%),
        radial-gradient(720px 440px at 78% 62%, var(--halo), transparent 75%);
      opacity: 0.7;
      filter: blur(8px);
    }

    .map-backdrop svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

    /* Map elements */
    .region {
      fill: var(--map-fill);
      stroke: var(--map-line);
      stroke-width: 0.7;
      stroke-linejoin: round;
      stroke-linecap: round;
      vector-effect: non-scaling-stroke;
      filter: drop-shadow(0 0 2.5px var(--map-glow));
      transition: stroke 0.5s, filter 0.5s, fill 0.5s;
    }

    .graticule {
      fill: none;
      stroke: var(--map-line-soft);
      stroke-width: 0.4;
      stroke-dasharray: 2 4;
      vector-effect: non-scaling-stroke;
      transition: stroke 0.5s;
      opacity: 0.5;
    }

    .node {
      fill: var(--node);
      filter: drop-shadow(0 0 6px var(--map-glow));
      transition: fill 0.5s, filter 0.5s;
    }
    .node-soft {
      fill: var(--node-soft);
      filter: drop-shadow(0 0 4px var(--map-glow));
      transition: fill 0.5s, filter 0.5s;
    }

    .link {
      fill: none;
      stroke: var(--link);
      stroke-width: 1;
      stroke-dasharray: 5 6;
      vector-effect: non-scaling-stroke;
      transition: stroke 0.5s;
      animation: dash-flow 14s linear infinite;
      filter: drop-shadow(0 0 3px var(--map-glow));
    }
    @keyframes dash-flow { to { stroke-dashoffset: -200; } }

    .hub-label {
      font-family: 'JetBrains Mono', Menlo, Consolas, monospace;
      font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
      fill: var(--label); transition: fill 0.5s;
    }
    .city-label {
      font-family: 'JetBrains Mono', Menlo, Consolas, monospace;
      font-size: 7px; letter-spacing: 0.14em; text-transform: uppercase;
      fill: var(--label); opacity: 0.85; transition: fill 0.5s;
    }
    .hub-label-bg { fill: var(--label-bg); transition: fill 0.5s; }

    .pulse {
      fill: none; stroke: var(--node); stroke-width: 0.7;
      opacity: 0; transform-origin: center;
      vector-effect: non-scaling-stroke;
      animation: pulse-ring 3.6s ease-out infinite;
      transition: stroke 0.5s;
    }
    .pulse.delay { animation-delay: 1.8s; }
    @keyframes pulse-ring {
      0%   { r: 2;  opacity: 0.7; }
      100% { r: 22; opacity: 0; }
    }

    .dot-grid {
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, var(--grid-dot) 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: 0.6;
    }

    .vignette {
      position: absolute; inset: 0;
      background: radial-gradient(
        ellipse at center,
        transparent 0%,
        transparent 35%,
        var(--vignette-edge) 95%
      );
      pointer-events: none;
    }

    /* ─────────────────────────────────────────────────────────────
       Empty-state hero
       ───────────────────────────────────────────────────────────── */
    .stage {
      flex: 1; position: relative; z-index: 3;
      overflow-y: auto; padding: 40px 32px 16px;
      display: flex; flex-direction: column;
    }

    .empty-state {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      max-width: 820px; width: 100%; margin: 0 auto; padding-top: 40px;
    }

    .welcome-icon {
      width: 84px; height: 84px; border-radius: 22px;
      background: linear-gradient(135deg, #ffe600 0%, #ffd400 100%);
      color: #0a0a0f;
      display: flex; align-items: center; justify-content: center; font-size: 36px;
      box-shadow: 0 18px 44px -16px rgba(255, 230, 0, 0.55), 0 8px 22px -10px rgba(255, 230, 0, 0.4),
                  inset 0 1px 0 rgba(255, 255, 255, 0.4);
      position: relative; margin-bottom: 18px;
    }
    .welcome-icon::after {
      content: ''; position: absolute; inset: -10px; border-radius: 28px;
      background: radial-gradient(circle, rgba(255, 230, 0, 0.5), transparent 70%);
      filter: blur(20px); z-index: -1;
    }

    .hero-title {
      font-size: 30px; font-weight: 700; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffe600 0%, #ffd400 50%, #1a1a24 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    [data-theme="light"] .hero-title {
      background: linear-gradient(135deg, #1a1a24 0%, #1a1a24 50%, #ffe600 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }

    .hero-sub { font-size: 14px; color: var(--text-soft); margin-bottom: 30px; }

    .prompt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; max-width: 720px; }

    .prompt-card {
      display: flex; align-items: center; gap: 14px;
      padding: 18px 20px;
      background: var(--card-bg);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border); border-radius: 18px;
      cursor: pointer;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
    }
    .prompt-card:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 230, 0, 0.4);
      box-shadow: 0 12px 28px -10px rgba(255, 230, 0, 0.25);
    }

    .pc-icon {
      width: 44px; height: 44px; border-radius: 14px;
      background: linear-gradient(135deg, #ffe600 0%, #ffd400 100%); color: #0a0a0f;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; flex-shrink: 0;
      box-shadow: 0 4px 10px -6px rgba(255, 230, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.35);
    }
    .pc-text { display: flex; flex-direction: column; gap: 3px; }
    .pc-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .pc-desc { font-size: 12px; color: var(--text-soft); line-height: 1.45; }

    /* ─────────────────────────────────────────────────────────────
       Bottom: input + chips
       ───────────────────────────────────────────────────────────── */
    .input-area {
      position: relative; z-index: 4;
      padding: 12px 32px 18px;
      display: flex; flex-direction: column; gap: 12px; align-items: center;
    }
    .input-shell {
      width: 100%; max-width: 820px;
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; border-radius: 16px;
      background: var(--input-bg); backdrop-filter: blur(20px);
      border: 1px solid var(--input-border);
    }
    .input-shell input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-size: 14px; font-family: inherit;
    }
    .input-shell input::placeholder { color: var(--text-muted); }
    .send-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: 1px solid var(--card-border); background: var(--card-bg);
      color: var(--text-soft); cursor: pointer;
    }

    .chip-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .chip {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 7px 14px; border-radius: 999px;
      background: var(--chip-bg); backdrop-filter: blur(10px);
      border: 1px solid var(--chip-border); color: var(--text);
      font-size: 12.5px; font-weight: 600; cursor: pointer;
    }
    .input-hint { font-size: 11px; color: var(--text-muted); }
    kbd {
      background: var(--chip-bg); padding: 2px 7px; border-radius: 5px;
      font-size: 10.5px; font-family: 'JetBrains Mono', Consolas, monospace;
      color: var(--text); border: 1px solid var(--chip-border); font-weight: 600;
    }

    /* Theme toggle */
    .theme-toggle {
      position: fixed; top: 16px; right: 90px; z-index: 20;
      display: flex; gap: 4px; padding: 4px;
      background: var(--card-bg); backdrop-filter: blur(14px);
      border: 1px solid var(--card-border); border-radius: 999px;
    }
    .theme-toggle button {
      border: none; background: transparent; color: var(--text-muted);
      font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 6px 12px; border-radius: 999px; cursor: pointer;
      font-weight: 600; font-family: inherit;
    }
    .theme-toggle button.active {
      background: rgba(255, 230, 0, 0.16); color: var(--text);
      box-shadow: 0 0 0 1px rgba(255, 230, 0, 0.35);
    }
    [data-theme="light"] .theme-toggle button.active {
      background: rgba(15, 15, 22, 0.08);
      box-shadow: 0 0 0 1px rgba(15, 15, 22, 0.2);
    }
  </style>
</head>
<body>
  <div class="theme-toggle" role="group">
    <button data-theme-set="dark" class="active">Dark</button>
    <button data-theme-set="light">Light</button>
  </div>

  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-logo">EY</div>
        <div class="sidebar-title">MENA Assistant</div>
      </div>
      <button class="new-chat-btn">＋ New Chat</button>
      <div class="sidebar-section">Conversations</div>
      <div class="sidebar-empty">No conversations yet</div>
    </aside>

    <main class="main">
      <header class="main-header">
        <div class="main-header-left">
          <button class="icon-btn">≡</button>
          <div class="convo-title">New Conversation</div>
        </div>
        <div class="header-right">
          <button class="icon-btn">↗</button>
          <button class="icon-btn">☀</button>
          <div class="avatar-yellow">M</div>
          <button class="icon-btn">↩</button>
        </div>
      </header>

      <!-- ── Map backdrop (rendered with d3 from real GeoJSON) ── -->
      <div class="map-backdrop" aria-hidden="true">
        <div class="dot-grid"></div>
        <svg id="mapSvg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
          <g class="graticule-layer"></g>
          <g class="region-layer"></g>
          <g class="link-layer"></g>
          <g class="city-layer"></g>
          <g class="hub-layer"></g>
        </svg>
        <div class="vignette"></div>
      </div>

      <section class="stage">
        <div class="empty-state">
          <div class="welcome-icon">✦</div>
          <h1 class="hero-title">What can I help with?</h1>
          <p class="hero-sub">Your MENA region AI assistant for data, reports, and insights.</p>
          <div class="prompt-grid">
            <button class="prompt-card">
              <div class="pc-icon">🏛</div>
              <div class="pc-text">
                <div class="pc-title">Finance policies</div>
                <div class="pc-desc">Explore the latest finance function policies and procedures</div>
              </div>
            </button>
            <button class="prompt-card">
              <div class="pc-icon">👥</div>
              <div class="pc-text">
                <div class="pc-title">Talent guidelines</div>
                <div class="pc-desc">Learn about talent function guidelines and employee resources</div>
              </div>
            </button>
            <button class="prompt-card">
              <div class="pc-icon">☁</div>
              <div class="pc-text">
                <div class="pc-title">AWS information</div>
                <div class="pc-desc">Discover details about AWS functions and cloud services</div>
              </div>
            </button>
            <button class="prompt-card">
              <div class="pc-icon">📊</div>
              <div class="pc-text">
                <div class="pc-title">MENA reports</div>
                <div class="pc-desc">Get a summary of the latest regional data and analysis</div>
              </div>
            </button>
          </div>
        </div>
      </section>

      <div class="input-area">
        <div class="input-shell">
          <input type="text" placeholder="Ask me anything..." />
          <button class="send-btn">↑</button>
        </div>
        <div class="chip-row">
          <span class="chip">⌂ AWS</span>
          <span class="chip">📣 BMC</span>
          <span class="chip">＋ C&amp;I</span>
          <span class="chip">$ Finance</span>
          <span class="chip">▦ GCO</span>
          <span class="chip">🛡 Risk</span>
          <span class="chip">⊞ SCS</span>
          <span class="chip">⌾ TME</span>
          <span class="chip">👤 Talent</span>
        </div>
        <div class="input-hint">Press <kbd>Enter</kbd> to send, <kbd>Shift+Enter</kbd> for new line</div>
      </div>
    </main>
  </div>

  <!-- d3 + topojson for real country geometry -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script>
    // ── Theme toggle ──
    const root = document.documentElement;
    document.querySelectorAll('[data-theme-set]').forEach(btn => {
      btn.addEventListener('click', () => {
        root.setAttribute('data-theme', btn.dataset.themeSet);
        document.querySelectorAll('.theme-toggle button')
          .forEach(b => b.classList.toggle('active', b === btn));
      });
    });

    // ── Map render ──
    // ISO numeric codes for the countries we want to show
    const SCANDI_IDS = new Set(['578', '752', '246', '208', '352']); // Norway, Sweden, Finland, Denmark, Iceland
    const MENA_IDS = new Set([
      // North Africa
      '012', '434', '504', '729', '732', '788', '818', // Algeria, Libya, Morocco, Sudan, W. Sahara, Tunisia, Egypt
      // Middle East
      '048', '364', '368', '376', '400', '414', '422', '512', '634', '682',
      '275', '760', '784', '792', '887'
      // Bahrain, Iran, Iraq, Israel, Jordan, Kuwait, Lebanon, Oman, Qatar, Saudi Arabia,
      // Palestine, Syria, UAE, Turkey, Yemen
    ]);

    const CITIES = [
      // Scandinavia
      { name: 'Oslo',       lon: 10.7522, lat: 59.9139, label: 'right' },
      { name: 'Copenhagen', lon: 12.5683, lat: 55.6761, label: 'right' },
      { name: 'Helsinki',   lon: 24.9384, lat: 60.1699, label: 'right' },
      // MENA
      { name: 'Istanbul',   lon: 28.9784, lat: 41.0082, label: 'left'  },
      { name: 'Cairo',      lon: 31.2357, lat: 30.0444, label: 'left'  },
      { name: 'Tunis',      lon: 10.1815, lat: 36.8065, label: 'left'  },
      { name: 'Beirut',     lon: 35.5018, lat: 33.8938, label: 'right' },
      { name: 'Dubai',      lon: 55.2708, lat: 25.2048, label: 'right' },
      { name: 'Doha',       lon: 51.5310, lat: 25.2854, label: 'left'  },
    ];

    const HUBS = [
      { name: 'Scandinavian Hub', lon: 18.0686, lat: 59.3293, primary: true,  side: 'right' },
      { name: 'Middle East Hub',  lon: 46.6753, lat: 24.7136, primary: true,  side: 'right' },
    ];

    const VBOX = { w: 1600, h: 900 };

    async function renderMap() {
      try {
        const world = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json')
          .then(r => r.json());
        const land = topojson.feature(world, world.objects.countries);
        const wanted = land.features.filter(f =>
          SCANDI_IDS.has(f.id) || MENA_IDS.has(f.id)
        );
        const fc = { type: 'FeatureCollection', features: wanted };

        // Manual mercator: fits BOTH Scandinavia (~60°N) and MENA (~25°N)
        // into the viewport with comfortable margins.
        const projection = d3.geoMercator()
          .center([28, 44])
          .scale(820)
          .translate([VBOX.w / 2, VBOX.h / 2]);
        const path = d3.geoPath(projection);

        const svg = d3.select('#mapSvg');

        // Graticule (subtle longitude/latitude lines for "atlas" feel)
        const graticule = d3.geoGraticule().step([10, 10]);
        svg.select('.graticule-layer')
          .append('path')
          .attr('class', 'graticule')
          .attr('d', path(graticule()));

        // Country outlines (real geometry)
        svg.select('.region-layer')
          .selectAll('path.region')
          .data(wanted)
          .enter()
          .append('path')
          .attr('class', 'region')
          .attr('d', path);

        // Curved hub-to-hub link
        const [x1, y1] = projection([HUBS[0].lon, HUBS[0].lat]);
        const [x2, y2] = projection([HUBS[1].lon, HUBS[1].lat]);
        const cx = (x1 + x2) / 2;
        const cy = Math.min(y1, y2) - 100;
        svg.select('.link-layer')
          .append('path')
          .attr('class', 'link')
          .attr('d', `M ${x1} ${y1} Q ${cx} ${cy} ${x2} ${y2}`);

        // Cities — small dots, label aligned outward from the regions
        const cityG = svg.select('.city-layer');
        CITIES.forEach(c => {
          const [cx2, cy2] = projection([c.lon, c.lat]);
          cityG.append('circle')
            .attr('class', 'node-soft')
            .attr('cx', cx2).attr('cy', cy2).attr('r', 2.2);
          const tx = c.label === 'left' ? cx2 - 8 : cx2 + 8;
          cityG.append('text')
            .attr('class', 'city-label')
            .attr('x', tx).attr('y', cy2 + 3)
            .attr('text-anchor', c.label === 'left' ? 'end' : 'start')
            .text(c.name);
        });

        // Hubs (primary glow + label tag)
        const hubG = svg.select('.hub-layer');
        HUBS.forEach(h => {
          const [hx, hy] = projection([h.lon, h.lat]);
          if (h.primary) {
            hubG.append('circle').attr('class', 'pulse').attr('cx', hx).attr('cy', hy).attr('r', 2);
            hubG.append('circle').attr('class', 'pulse delay').attr('cx', hx).attr('cy', hy).attr('r', 2);
          }
          hubG.append('circle').attr('class', 'node').attr('cx', hx).attr('cy', hy).attr('r', h.primary ? 4 : 3.2);
          hubG.append('circle').attr('class', 'node-soft').attr('cx', hx).attr('cy', hy).attr('r', h.primary ? 9 : 6);

          // Label tag — offset to the side, with a connector line
          const labelW = h.name.length * 6.6 + 16;
          const lx = hx + 18;
          const ly = hy - 7;
          hubG.append('line')
            .attr('x1', hx + 4).attr('y1', hy)
            .attr('x2', lx - 2).attr('y2', ly + 7)
            .attr('stroke', 'var(--link-soft)').attr('stroke-width', 0.6);
          hubG.append('rect')
            .attr('class', 'hub-label-bg')
            .attr('x', lx).attr('y', ly).attr('width', labelW).attr('height', 14).attr('rx', 3);
          hubG.append('text')
            .attr('class', 'hub-label')
            .attr('x', lx + 8).attr('y', ly + 10)
            .text(h.name);
        });
      } catch (err) {
        console.error('Map render failed:', err);
      }
    }

    renderMap();
  </script>
</body>
</html>
